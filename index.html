<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>English to Gujarati Translator by Yani</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        text-align: center;
        background-color: #f2f2f2;
        padding: 40px 20px;
        margin: 0;
      }

      .logo {
        font-size: 30px;
        font-weight: bold;
        color: #007acc;
        margin-bottom: 5px;
      }

      h1 {
        color: #333;
        font-size: 22px;
        margin-top: 5px;
      }

      .author {
        font-size: 14px;
        color: #666;
        margin-top: -10px;
        margin-bottom: 20px;
      }

      textarea {
        padding: 10px;
        width: 100%;
        max-width: 500px;
        height: 100px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin: 20px 0;
        resize: none;
      }

      button {
        padding: 10px 25px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background-color: #007acc;
        color: white;
        cursor: pointer;
      }

      .translation-box {
        font-size: 18px;
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background-color: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        word-wrap: break-word;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 18px;
        }

        .logo {
          font-size: 24px;
        }

        textarea,
        .translation-box {
          font-size: 16px;
        }

        button {
          font-size: 14px;
          padding: 8px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="logo">🔤 Yani</div>

    <h1>🌐 English to Gujarati Translator</h1>
    <p class="author">Created by Yani Prajapati</p>

    <p>Type your full sentence or word below:</p>
    <textarea
      id="userInput"
      placeholder="Example: I love Gujarati food."
    ></textarea>
    <br />
    <button onclick="translateText()">Translate</button>

    <div class="translation-box" id="output">
      Translation will appear here...
    </div>

    <script>
      async function translateText() {
        const text = document.getElementById("userInput").value.trim();
        const output = document.getElementById("output");

        if (text === "") {
          output.innerText = "Please enter a sentence or word.";
          return;
        }

        const encodedText = encodeURIComponent(text);
        const url = `https://api.mymemory.translated.net/get?q=${encodedText}&langpair=en|gu`;

        try {
          const res = await fetch(url);
          const data = await res.json();
          const translated = data.responseData.translatedText;

          output.innerText = `Gujarati: ${translated}`;
        } catch (error) {
          output.innerText = "Translation failed. Please try again later.";
        }
      }
    </script>
  </body>
</html>
